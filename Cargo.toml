[package]
name = "matrix-export-tool"
authors = ["Kirin Etheridge <revelation@krxt.dev>"]
version = "0.1.0"
edition = "2024"
license = "ISC"

[dependencies]
anyhow = "1.0"
matrix-sdk = { version = "0.12", default-features = false, features = ["e2e-encryption", "automatic-room-key-forwarding", "rustls-tls", "qrcode"] }
promkit = { version = "0.9", features = ["all"] }
promkit-derive = "0.1"
reqwest = { version = "0.12", default-features = false, features = ["charset", "http2", "rustls-tls", "system-proxy"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1.41"
tracing-appender = "0.2.3"
tracing-subscriber = "0.3.19"
